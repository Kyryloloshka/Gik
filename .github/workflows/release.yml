# Official cargo-dist CI
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # This single job will use the official cargo-dist action
  # which handles everything: planning, building, and uploading.
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: cargo dist
        # This is the "magic" action that replaces all our manual curl and build steps
        uses: axodotdev/cargo-dist-project@main
        with:
          # We pass our required flags here
          args: "--allow-dirty"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
