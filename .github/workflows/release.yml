# Simple CI for cargo-dist
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.19.1/cargo-dist-installer.sh | sh
      - name: Run cargo-dist build & host
        # Explicitly pass --allow-dirty to BOTH commands to satisfy cargo-dist's strictness
        run: |
          cargo dist build --tag=${{ github.ref_name || 'v0.1.8' }} --allow-dirty
          cargo dist host --tag=${{ github.ref_name || 'v0.1.8' }} --steps=upload --steps=create-release --allow-dirty

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
