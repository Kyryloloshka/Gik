name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish for ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.19.1/cargo-dist-installer.sh | sh
      
      - name: Build and Upload
        shell: bash
        run: |
          # Use actual tag or fallback for workflow_dispatch
          TAG=${{ github.ref_name }}
          if [ "$TAG" == "main" ]; then TAG="v0.1.14"; fi
          
          # Build artifacts for this platform
          cargo dist build --tag=$TAG --allow-dirty
          
          # Upload to GitHub Release
          cargo dist host --tag=$TAG --steps=create --steps=upload --allow-dirty
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
