name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. Create the tag if it doesn't exist
  tagger:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check-tag
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | cut -d '"' -f 2)
          TAG="v$VERSION"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  # 2. Build binaries for each OS
  build:
    needs: tagger
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.19.1/cargo-dist-installer.sh | sh
      - name: Build artifacts
        run: cargo dist build --tag=${{ needs.tagger.outputs.tag }} --allow-dirty
      - name: Upload artifacts to GH Actions
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: target/distrib/*

  # 3. Collect everything and create the final GitHub Release via GH CLI
  publish:
    needs: [tagger, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: artifacts-*
          merge-multiple: true
      - name: Create GitHub Release and Upload
        run: |
          TAG=${{ needs.tagger.outputs.tag }}
          # Check if release exists, if not create it
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating new release $TAG"
            gh release create "$TAG" artifacts/* --title "$TAG" --notes "Gik Release $TAG"
          else
            echo "Release $TAG already exists, uploading assets"
            gh release upload "$TAG" artifacts/* --clobber
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
